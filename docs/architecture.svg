<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1220 792" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arw" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6e7681"/>
    </marker>
    <marker id="arwr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#bc8cff"/>
    </marker>
    <linearGradient id="canvas" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#0a0d13"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1220" height="792" rx="16" fill="url(#canvas)"/>
  <rect x="0.5" y="0.5" width="1219" height="791" rx="16" fill="none" stroke="#21262d"/>

  <text x="40" y="46" fill="#e6edf3" font-size="20" font-weight="700">enterprise-rag-platform</text>
  <text x="40" y="68" fill="#7d8590" font-size="13">Multi-agent RAG · hybrid retrieval · self-correcting agents · guardrails · observability</text>

  <!-- ===================== QUERY PANEL ===================== -->
  <rect x="32" y="92" width="1156" height="330" rx="12" fill="#12171f" stroke="#21262d"/>
  <text x="52" y="118" fill="#58a6ff" font-size="12" font-weight="700" letter-spacing="1.5">QUERY  PATH</text>

  <!-- Client -->
  <rect x="52" y="150" width="120" height="50" rx="9" fill="#161b22" stroke="#58a6ff" stroke-width="1.4"/>
  <text x="112" y="180" fill="#e6edf3" font-size="13" text-anchor="middle">Client</text>
  <!-- FastAPI -->
  <rect x="222" y="150" width="140" height="50" rx="9" fill="#161b22" stroke="#58a6ff" stroke-width="1.4"/>
  <text x="292" y="174" fill="#e6edf3" font-size="13" text-anchor="middle">FastAPI</text>
  <text x="292" y="190" fill="#7d8590" font-size="11" text-anchor="middle">JWT · SSE</text>
  <!-- Guardrails -->
  <rect x="412" y="150" width="150" height="50" rx="9" fill="#161b22" stroke="#e3b341" stroke-width="1.4"/>
  <text x="487" y="174" fill="#e6edf3" font-size="13" text-anchor="middle">Guardrails</text>
  <text x="487" y="190" fill="#7d8590" font-size="11" text-anchor="middle">PII · injection</text>

  <line x1="172" y1="175" x2="216" y2="175" stroke="#6e7681" stroke-width="1.6" marker-end="url(#arw)"/>
  <text x="194" y="167" fill="#7d8590" font-size="10" text-anchor="middle">SSE</text>
  <line x1="362" y1="175" x2="406" y2="175" stroke="#6e7681" stroke-width="1.6" marker-end="url(#arw)"/>

  <!-- LangGraph cluster -->
  <rect x="602" y="128" width="566" height="150" rx="11" fill="#0f1320" stroke="#30363d" stroke-dasharray="4 4"/>
  <text x="620" y="150" fill="#bc8cff" font-size="11" font-weight="700" letter-spacing="1">LangGraph  StateGraph</text>
  <line x1="562" y1="175" x2="620" y2="175" stroke="#6e7681" stroke-width="1.6" marker-end="url(#arw)"/>

  <g font-size="12" text-anchor="middle">
    <rect x="622" y="166" width="92" height="40" rx="8" fill="#161b22" stroke="#bc8cff" stroke-width="1.3"/>
    <text x="668" y="191" fill="#e6edf3">Router</text>
    <rect x="730" y="166" width="98" height="40" rx="8" fill="#161b22" stroke="#bc8cff" stroke-width="1.3"/>
    <text x="779" y="191" fill="#e6edf3">Retriever</text>
    <rect x="844" y="166" width="98" height="40" rx="8" fill="#161b22" stroke="#bc8cff" stroke-width="1.3"/>
    <text x="893" y="191" fill="#e6edf3">Reasoner</text>
    <rect x="958" y="166" width="88" height="40" rx="8" fill="#161b22" stroke="#bc8cff" stroke-width="1.3"/>
    <text x="1002" y="191" fill="#e6edf3">Critic</text>
    <rect x="1062" y="166" width="90" height="40" rx="8" fill="#161b22" stroke="#bc8cff" stroke-width="1.3"/>
    <text x="1107" y="191" fill="#e6edf3">Citations</text>
  </g>
  <line x1="714" y1="186" x2="726" y2="186" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arw)"/>
  <line x1="828" y1="186" x2="840" y2="186" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arw)"/>
  <line x1="942" y1="186" x2="954" y2="186" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arw)"/>
  <line x1="1046" y1="186" x2="1058" y2="186" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arw)"/>
  <!-- revise loop Critic -> Reasoner -->
  <path d="M1002,206 C1002,238 893,238 893,208" fill="none" stroke="#bc8cff" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#arwr)"/>
  <text x="947" y="252" fill="#bc8cff" font-size="10" text-anchor="middle">revise · max 2</text>

  <!-- Retrieval strip -->
  <rect x="730" y="320" width="150" height="50" rx="9" fill="#161b22" stroke="#56d364" stroke-width="1.4"/>
  <text x="805" y="344" fill="#e6edf3" font-size="13" text-anchor="middle">Hybrid search</text>
  <text x="805" y="360" fill="#7d8590" font-size="11" text-anchor="middle">RRF + rerank</text>
  <path d="M805,206 L805,316" fill="none" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arw)"/>

  <!-- Qdrant cylinder -->
  <g>
    <path d="M940,322 a34,8 0 0 1 68,0 v36 a34,8 0 0 1 -68,0 z" fill="#161b22" stroke="#768390" stroke-width="1.3"/>
    <ellipse cx="974" cy="322" rx="34" ry="8" fill="#161b22" stroke="#768390" stroke-width="1.3"/>
    <text x="974" y="352" fill="#e6edf3" font-size="12" text-anchor="middle">Qdrant</text>
  </g>
  <line x1="880" y1="345" x2="936" y2="345" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arw)"/>

  <!-- Observability -->
  <rect x="222" y="320" width="200" height="50" rx="9" fill="#161b22" stroke="#f778ba" stroke-width="1.4"/>
  <text x="322" y="344" fill="#e6edf3" font-size="13" text-anchor="middle">Observability</text>
  <text x="322" y="360" fill="#7d8590" font-size="11" text-anchor="middle">Prometheus · OTel · Grafana</text>
  <path d="M292,200 L292,316" fill="none" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arw)"/>

  <!-- ===================== INGESTION PANEL ===================== -->
  <rect x="32" y="446" width="1156" height="316" rx="12" fill="#12171f" stroke="#21262d"/>
  <text x="52" y="472" fill="#58a6ff" font-size="12" font-weight="700" letter-spacing="1.5">INGESTION  PIPELINE</text>

  <rect x="52" y="506" width="120" height="50" rx="9" fill="#161b22" stroke="#58a6ff" stroke-width="1.4"/>
  <text x="112" y="530" fill="#e6edf3" font-size="13" text-anchor="middle">Upload</text>
  <text x="112" y="546" fill="#7d8590" font-size="11" text-anchor="middle">API</text>

  <rect x="222" y="506" width="120" height="50" rx="9" fill="#161b22" stroke="#ff9b72" stroke-width="1.4"/>
  <text x="282" y="536" fill="#e6edf3" font-size="13" text-anchor="middle">RabbitMQ</text>

  <rect x="392" y="506" width="130" height="50" rx="9" fill="#161b22" stroke="#58a6ff" stroke-width="1.4"/>
  <text x="457" y="530" fill="#e6edf3" font-size="13" text-anchor="middle">Ingestion</text>
  <text x="457" y="546" fill="#7d8590" font-size="11" text-anchor="middle">worker</text>

  <!-- Dedup diamond -->
  <path d="M602,531 l40,-28 l40,28 l-40,28 z" fill="#161b22" stroke="#e3b341" stroke-width="1.4"/>
  <text x="642" y="535" fill="#e6edf3" font-size="12" text-anchor="middle">Dedup?</text>

  <rect x="742" y="506" width="120" height="50" rx="9" fill="#161b22" stroke="#bc8cff" stroke-width="1.4"/>
  <text x="802" y="536" fill="#e6edf3" font-size="13" text-anchor="middle">Chunker</text>

  <rect x="912" y="506" width="150" height="50" rx="9" fill="#161b22" stroke="#56d364" stroke-width="1.4"/>
  <text x="987" y="530" fill="#e6edf3" font-size="13" text-anchor="middle">Embedder</text>
  <text x="987" y="546" fill="#7d8590" font-size="11" text-anchor="middle">bge-m3</text>

  <!-- Qdrant (ingestion side) -->
  <g>
    <path d="M1096,508 a30,7 0 0 1 60,0 v34 a30,7 0 0 1 -60,0 z" fill="#161b22" stroke="#768390" stroke-width="1.3"/>
    <ellipse cx="1126" cy="508" rx="30" ry="7" fill="#161b22" stroke="#768390" stroke-width="1.3"/>
    <text x="1126" y="536" fill="#e6edf3" font-size="12" text-anchor="middle">Qdrant</text>
  </g>

  <!-- Postgres cylinder -->
  <g>
    <path d="M578,626 a34,8 0 0 1 68,0 v34 a34,8 0 0 1 -68,0 z" fill="#161b22" stroke="#768390" stroke-width="1.3"/>
    <ellipse cx="612" cy="626" rx="34" ry="8" fill="#161b22" stroke="#768390" stroke-width="1.3"/>
    <text x="612" y="655" fill="#e6edf3" font-size="12" text-anchor="middle">PostgreSQL</text>
  </g>
  <!-- Redis cylinder -->
  <g>
    <path d="M957,626 a30,7 0 0 1 60,0 v34 a30,7 0 0 1 -60,0 z" fill="#161b22" stroke="#768390" stroke-width="1.3"/>
    <ellipse cx="987" cy="626" rx="30" ry="7" fill="#161b22" stroke="#768390" stroke-width="1.3"/>
    <text x="987" y="654" fill="#e6edf3" font-size="12" text-anchor="middle">Redis</text>
  </g>

  <line x1="172" y1="531" x2="216" y2="531" stroke="#6e7681" stroke-width="1.6" marker-end="url(#arw)"/>
  <line x1="342" y1="531" x2="386" y2="531" stroke="#6e7681" stroke-width="1.6" marker-end="url(#arw)"/>
  <line x1="522" y1="531" x2="600" y2="531" stroke="#6e7681" stroke-width="1.6" marker-end="url(#arw)"/>
  <line x1="682" y1="531" x2="738" y2="531" stroke="#6e7681" stroke-width="1.6" marker-end="url(#arw)"/>
  <text x="712" y="523" fill="#56d364" font-size="10" text-anchor="middle">new</text>
  <line x1="862" y1="531" x2="908" y2="531" stroke="#6e7681" stroke-width="1.6" marker-end="url(#arw)"/>
  <line x1="1062" y1="531" x2="1092" y2="531" stroke="#6e7681" stroke-width="1.6" marker-end="url(#arw)"/>
  <!-- dedup dup -> postgres -->
  <path d="M642,559 L642,600 L612,600 L612,614" fill="none" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arw)"/>
  <text x="600" y="590" fill="#7d8590" font-size="10" text-anchor="end">duplicate</text>
  <!-- embedder <-> redis cache -->
  <path d="M987,556 L987,614" fill="none" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arw)"/>
  <text x="998" y="588" fill="#7d8590" font-size="10">cache</text>

  <!-- Legend -->
  <g font-size="11" fill="#7d8590">
    <circle cx="52" cy="742" r="5" fill="none" stroke="#bc8cff" stroke-width="1.4"/><text x="64" y="746">agents</text>
    <circle cx="140" cy="742" r="5" fill="none" stroke="#56d364" stroke-width="1.4"/><text x="152" y="746">retrieval</text>
    <circle cx="238" cy="742" r="5" fill="none" stroke="#e3b341" stroke-width="1.4"/><text x="250" y="746">guardrails</text>
    <circle cx="348" cy="742" r="5" fill="none" stroke="#58a6ff" stroke-width="1.4"/><text x="360" y="746">edge / api</text>
    <circle cx="452" cy="742" r="5" fill="none" stroke="#768390" stroke-width="1.4"/><text x="464" y="746">storage</text>
    <circle cx="542" cy="742" r="5" fill="none" stroke="#f778ba" stroke-width="1.4"/><text x="554" y="746">observability</text>
  </g>
</svg>
