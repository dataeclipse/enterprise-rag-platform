services:
  app:
    build:
      context: .
      args:
        WITH_ML: "true"
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      RAG_QDRANT__URL: http://qdrant:6333
      RAG_POSTGRES__DSN: postgresql+asyncpg://rag:rag@postgres:5432/rag
      RAG_REDIS__URL: redis://redis:6379/0
      RAG_RABBITMQ__URL: amqp://rag:rag@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    build:
      context: .
      args:
        WITH_ML: "true"
    command: ["python", "-m", "rag.worker"]
    env_file: .env
    environment:
      RAG_QDRANT__URL: http://qdrant:6333
      RAG_POSTGRES__DSN: postgresql+asyncpg://rag:rag@postgres:5432/rag
      RAG_REDIS__URL: redis://redis:6379/0
      RAG_RABBITMQ__URL: amqp://rag:rag@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  qdrant:
    image: qdrant/qdrant:v1.14.1
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: rag
      RABBITMQ_DEFAULT_PASS: rag
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus:v3.4.1
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:12.0.1
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  qdrant_data:
  pg_data:
