apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-config
  labels:
    app: enterprise-rag-platform
data:
  RAG_ENV: "prod"
  RAG_LOG_LEVEL: "INFO"
  RAG_QDRANT__URL: "http://qdrant:6333"
  RAG_REDIS__URL: "redis://redis:6379/0"
  RAG_RABBITMQ__URL: "amqp://rag:rag@rabbitmq:5672/"
  RAG_EMBEDDINGS__PROVIDER: "local"
  RAG_EMBEDDINGS__MODEL: "BAAI/bge-m3"
  RAG_LLM__BASE_URL: "http://vllm:8000/v1"
  RAG_LLM__MODEL: "qwen3-8b"
