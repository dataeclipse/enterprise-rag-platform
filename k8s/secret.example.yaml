apiVersion: v1
kind: Secret
metadata:
  name: rag-secrets
  labels:
    app: enterprise-rag-platform
type: Opaque
stringData:
  RAG_AUTH__SECRET_KEY: "replace-with-32-byte-random-secret"
  RAG_POSTGRES__DSN: "postgresql+asyncpg://rag:replace-me@postgres:5432/rag"
  RAG_LLM__API_KEY: "replace-if-external-provider"
