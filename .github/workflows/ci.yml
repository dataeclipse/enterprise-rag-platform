name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: "Install dependencies"
        run: uv sync --group dev
      - name: "Lint"
        run: |
          uv run ruff check src tests
          uv run black --check src tests
      - name: "Typecheck"
        run: uv run mypy
      - name: "Test"
        run: uv run pytest tests -m "not integration" --cov=src/rag --cov-report=term --cov-fail-under=70

  build:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: "Build image"
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: enterprise-rag-platform:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
